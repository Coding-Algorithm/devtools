name: Build and Deploy

on:
  push:
    branches:
      - main
      - development

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.x'
          cache: 'npm'

      - name: Set deployment environment
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "NODE_ENV=production"                                  >> $GITHUB_ENV
            echo "SFTP_REMOTE_PATH=/var/sftp/devtools.ibrahimtaofeek.com" >> $GITHUB_ENV
            echo "PM2_APP_NAME=devtools"                                >> $GITHUB_ENV
            echo "APP_DIR=/var/www/devtools.ibrahimtaofeek.com"         >> $GITHUB_ENV
            echo "APP_PORT=3003"                                        >> $GITHUB_ENV
            echo "APP_URL=https://devtools.ibrahimtaofeek.com"          >> $GITHUB_ENV
          else
            echo "NODE_ENV=staging"                                             >> $GITHUB_ENV
            echo "SFTP_REMOTE_PATH=/var/sftp/staging.devtools.ibrahimtaofeek.com" >> $GITHUB_ENV
            echo "PM2_APP_NAME=devtools-staging"                                >> $GITHUB_ENV
            echo "APP_DIR=/var/www/staging.devtools.ibrahimtaofeek.com"         >> $GITHUB_ENV
            echo "APP_PORT=3004"                                                >> $GITHUB_ENV
            echo "APP_URL=https://staging.devtools.ibrahimtaofeek.com"          >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NODE_ENV: ${{ env.NODE_ENV }}

      - name: Copy static assets for standalone output
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Package build artifact
        run: tar -czf deploy.tar.gz -C .next/standalone .

      - name: Upload artifact via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          local_path: ./deploy.tar.gz
          remote_path: ${{ env.SFTP_REMOTE_PATH }}
          sftp_only: true

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Add known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SFTP_PORT }} ${{ secrets.SFTP_HOST }} >> ~/.ssh/known_hosts

      - name: Activate release
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -p ${{ secrets.SFTP_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SFTP_HOST }} << 'ENDSSH'
          set -e

          RELEASE_DIR="${{ env.APP_DIR }}/releases/$(date +%Y%m%d_%H%M%S)"
          mkdir -p "$RELEASE_DIR"

          tar -xzf "${{ env.SFTP_REMOTE_PATH }}/deploy.tar.gz" -C "$RELEASE_DIR"
          # rm -f "${{ env.SFTP_REMOTE_PATH }}/deploy.tar.gz"

          ln -sfn "$RELEASE_DIR" "${{ env.APP_DIR }}/current"

          PORT=${{ env.APP_PORT }} pm2 restart ${{ env.PM2_APP_NAME }} --update-env \
            || PORT=${{ env.APP_PORT }} pm2 start "${{ env.APP_DIR }}/current/server.js" \
                --name "${{ env.PM2_APP_NAME }}" \
                --update-env
          pm2 save

          ls -dt "${{ env.APP_DIR }}/releases"/*/ | tail -n +4 | xargs rm -rf
          ENDSSH

      - name: Health check
        run: |
          sleep 5
          curl --fail --silent --show-error \
               --retry 5 --retry-delay 5 --retry-connrefused \
               --max-time 15 \
               "${{ env.APP_URL }}"
          echo "Health check passed — ${{ env.APP_URL }} is responding."
